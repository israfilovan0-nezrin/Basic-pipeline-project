name: VS Code CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu götür
        uses: actions/checkout@v3

      - name: Test
        run: echo "Test OK ✅"

      - name: Build
        run: echo "Build OK 🔧"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .